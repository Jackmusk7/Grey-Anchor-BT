<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grey Anchor — Trading Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#05070c;--bg2:#0a0e18;--bg3:#0f1422;--bg4:#141a2a;
--surface:rgba(255,255,255,0.025);--surface2:rgba(255,255,255,0.05);--surface3:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.06);--border-hi:rgba(255,255,255,0.12);
--text:#f0f2ff;--muted:#5e6a86;--dim:#3a4460;
--accent:#7c6aef;--accent-glow:rgba(124,106,239,0.15);--accent2:#00c9a7;--accent2-glow:rgba(0,201,167,0.12);
--green:#10b981;--red:#f43f5e;--amber:#f59e0b;--rose:#fb7185;
--font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
--glass:rgba(10,14,24,0.85);--radius:14px;--radius-lg:18px
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
background:radial-gradient(ellipse 60% 40% at 8% 0%,rgba(124,106,239,0.07),transparent),
radial-gradient(ellipse 40% 35% at 92% 95%,rgba(0,201,167,0.05),transparent),
radial-gradient(ellipse 50% 30% at 50% 50%,rgba(124,106,239,0.02),transparent)}

/* ── SIDEBAR ── */
.sidebar{width:260px;min-width:260px;background:var(--glass);backdrop-filter:blur(24px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;z-index:2}
.logo-area{padding:32px 28px 28px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:14px}
.logo-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.logo-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.15));border-radius:12px}
.logo-icon svg{width:20px;height:20px;fill:#fff;position:relative;z-index:1}
.logo-text{font-size:17px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:8px;color:var(--muted);margin-top:4px;letter-spacing:4px;text-transform:uppercase;font-weight:500}
.nav{flex:1;padding:24px 14px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 18px;font-size:13.5px;color:var(--muted);cursor:pointer;border-radius:12px;transition:all .25s;margin-bottom:4px;position:relative;font-weight:500}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,var(--accent-glow),var(--accent2-glow));color:var(--text);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;border-radius:0 4px 4px 0;background:linear-gradient(180deg,var(--accent),var(--accent2))}
.nav-badge{margin-left:auto;font-size:10px;padding:3px 9px;border-radius:99px;font-weight:600;font-family:var(--mono);background:var(--surface2);color:var(--muted)}
.nav-item.active .nav-badge{background:rgba(124,106,239,0.2);color:var(--accent)}
.nav-notif{margin-left:auto;width:8px;height:8px;border-radius:50%;background:var(--rose);box-shadow:0 0 8px var(--rose)}
.nav-sep{height:1px;background:var(--border);margin:18px 18px}
.sidebar-footer{padding:20px 28px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:12px}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.user-name{font-size:13px;font-weight:600}.user-role{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px}
.dot-online{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MAIN ── */
.main{flex:1;padding:36px 44px;overflow-y:auto;position:relative;z-index:1}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px}
.main-title{font-size:28px;font-weight:800;letter-spacing:-0.8px}
.main-subtitle{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400}
.back-row{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.back-btn{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;padding:9px 18px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);font-family:var(--font);transition:all .2s;font-weight:500}
.back-btn:hover{color:var(--text);border-color:var(--border-hi);background:var(--surface3)}
.breadcrumb{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.breadcrumb span{cursor:pointer;transition:color .2s}.breadcrumb span:hover{color:var(--text)}.bc-sep{color:var(--dim);font-size:10px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .25s;border:none;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6550d4);color:#fff;box-shadow:0 4px 24px rgba(124,106,239,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,106,239,0.4)}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border-hi);background:var(--surface3)}
.btn-danger{background:rgba(244,63,94,0.1);color:var(--red);border:1px solid rgba(244,63,94,0.15)}.btn-danger:hover{background:rgba(244,63,94,0.18)}

/* ── GROUPS & CARDS ── */
.two-col-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.group-section{margin-bottom:28px}
.group-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.group-name{font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:4px 10px;margin:-4px -10px;border-radius:8px;border:1px solid transparent;transition:all .2s}
.group-name:hover{border-color:var(--border);background:var(--surface)}
.group-name-input{font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--bg);border:1px solid var(--accent);border-radius:8px;padding:4px 10px;color:var(--muted);font-family:var(--font);outline:none}
.group-count{font-size:11px;color:var(--dim);font-family:var(--mono)}
.group-del{color:var(--dim);cursor:pointer;font-size:14px;transition:color .2s;margin-left:auto}.group-del:hover{color:var(--red)}
.drop-zone{min-height:50px;border:2px dashed transparent;border-radius:14px;transition:all .3s;padding:4px;display:flex;flex-direction:column;gap:12px}
.drop-zone.over{border-color:var(--accent);background:var(--accent-glow)}
.folder-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.folder-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
.folder-card:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.35)}.folder-card:hover::before{opacity:1}
.folder-card[draggable="true"]{cursor:grab}.folder-card.dragging{opacity:0.3}
.folder-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.folder-status{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:8px}
.st-en-test{background:rgba(245,158,11,0.1);color:var(--amber)}.st-validee{background:rgba(16,185,129,0.1);color:var(--green)}.st-en-prod{background:rgba(124,106,239,0.1);color:var(--accent)}
.folder-actions{display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.icon-btn:hover{color:var(--text);border-color:var(--border-hi);background:var(--surface3)}.icon-btn.danger:hover{color:var(--red);border-color:rgba(244,63,94,0.3);background:rgba(244,63,94,0.06)}
.folder-name{font-size:16px;font-weight:700;letter-spacing:-0.2px}.folder-meta{font-size:12px;color:var(--muted);margin-top:6px}

/* ── DETAIL SECTIONS ── */
.section-row{display:flex;align-items:center;justify-content:space-between;margin:40px 0 20px}
.section-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.2px;cursor:pointer;padding:6px 12px;margin:-6px -12px;border-radius:8px;border:1px solid transparent;transition:all .2s;display:flex;align-items:center;gap:10px}
.section-title:hover{border-color:var(--border);background:var(--surface)}
.section-title::before{content:'';width:4px;height:18px;border-radius:4px;background:linear-gradient(180deg,var(--accent),var(--accent2));flex-shrink:0}
.section-title-input{font-size:16px;font-weight:700;background:var(--bg);border:1px solid var(--accent);border-radius:8px;padding:6px 12px;color:var(--text);font-family:var(--font);outline:none}
.upload-btn{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--accent2);cursor:pointer;padding:8px 18px;border-radius:10px;background:var(--accent2-glow);border:1px solid rgba(0,201,167,0.15);font-family:var(--font);transition:all .2s;font-weight:600}
.upload-btn:hover{background:rgba(0,201,167,0.18);color:#2de8c5}
.upload-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.upload-input{display:none}

/* ── FILES ── */
.file-list{display:flex;flex-direction:column;gap:8px}
.file-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;transition:all .2s}.file-row:hover{border-color:var(--border-hi);background:var(--bg3)}
.file-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.file-dot.html{background:var(--accent2)}.file-dot.pdf{background:var(--red)}.file-dot.img{background:var(--green)}.file-dot.other{background:var(--muted)}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;padding:2px 6px;margin:-2px -6px;border-radius:6px;border:1px solid transparent;transition:all .2s}.file-name:hover{border-color:var(--border);background:var(--surface)}
.file-name-input{font-size:13px;font-weight:600;background:var(--bg);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;color:var(--text);font-family:var(--font);outline:none;width:100%}
.file-meta{font-size:10px;color:var(--muted);margin-top:3px}
.file-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.file-action-btn{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid transparent;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s}
.file-action-btn:hover{border-color:var(--border);background:var(--surface2);color:var(--text)}
.file-action-btn.star:hover{color:var(--amber);border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.06)}
.file-action-btn.del:hover{color:var(--red);border-color:rgba(244,63,94,0.3);background:rgba(244,63,94,0.06)}
.file-preview-btn{font-size:11px;color:var(--accent2);cursor:pointer;padding:5px 12px;border-radius:8px;background:var(--accent2-glow);border:1px solid rgba(0,201,167,0.15);font-family:var(--font);transition:all .2s;font-weight:600}.file-preview-btn:hover{background:rgba(0,201,167,0.18)}
.empty-files{text-align:center;padding:24px;color:var(--dim);font-size:12px;border:1px dashed var(--border);border-radius:12px}

/* ── PREVIEW ── */
.preview-frame{margin-top:24px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);background:var(--bg)}
.preview-bar{background:var(--surface2);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.preview-bar-name{font-size:12px;color:var(--muted);font-family:var(--mono)}
.preview-actions{display:flex;gap:8px}
.p-btn{font-size:11px;color:var(--muted);cursor:pointer;padding:6px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-family:var(--font);transition:all .2s;text-decoration:none;font-weight:500}.p-btn:hover{color:var(--text);border-color:var(--border-hi)}
.preview-iframe{width:100%;min-height:600px;border:none;background:#fff}

/* ── VALIDATED ── */
.val-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.val-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--accent2))}
.val-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px}
.val-name{font-size:20px;font-weight:700}
.val-subtitle{font-size:12px;color:var(--muted);margin-top:6px;cursor:pointer;padding:2px 6px;margin-left:-6px;border-radius:4px;border:1px solid transparent;transition:all .2s}.val-subtitle:hover{border-color:var(--border);background:var(--surface)}
.val-subtitle-input{font-size:12px;background:var(--bg);border:1px solid var(--accent);border-radius:4px;padding:4px 8px;color:var(--muted);font-family:var(--font);outline:none;width:100%}
.val-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}
.kpi-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);font-weight:700}
.kpi-val{font-size:17px;font-weight:700;font-family:var(--mono);margin-top:5px}
.kpi-val.g{color:var(--green)}.kpi-val.r{color:var(--red)}.kpi-val.b{color:var(--accent2)}
.params-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.param-chip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center}
.param-chip-label{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.param-chip-val{font-size:14px;font-weight:700;font-family:var(--mono);margin-top:3px}
.add-chip-btn{width:36px;height:50px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.add-chip-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

/* ── DASHBOARD ── */
.dash-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;overflow:hidden}
.dash-card-title{font-size:14px;font-weight:700;margin-bottom:20px;color:var(--text);display:flex;align-items:center;gap:10px}
.dash-card-title::before{content:'';width:3px;height:14px;border-radius:3px;background:linear-gradient(180deg,var(--accent),var(--accent2))}
.recent-file{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;transition:all .2s}.recent-file:hover{background:var(--surface2)}
.recent-file-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.recent-file-meta{font-size:10px;color:var(--dim)}
.notif-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--surface);transition:all .2s}
.notif-item.unread{border-color:rgba(124,106,239,0.2);background:var(--accent-glow)}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.notif-dot.new{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.notif-text{flex:1;font-size:12px;color:var(--muted);line-height:1.4}.notif-text b{color:var(--text);font-weight:600}
.notif-time{font-size:10px;color:var(--dim);white-space:nowrap}

/* ── NOTEPAD ── */
.notepad{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.notepad-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notepad-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px}
.notepad-title::before{content:'';width:3px;height:14px;border-radius:3px;background:linear-gradient(180deg,var(--amber),var(--rose))}
.notepad-body{padding:0}
.notepad-textarea{width:100%;min-height:200px;background:transparent;border:none;padding:20px 24px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;resize:vertical;line-height:1.8}
.notepad-textarea::placeholder{color:var(--dim)}
.notepad-footer{padding:12px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notepad-status{font-size:11px;color:var(--dim)}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;width:520px;max-width:92%;box-shadow:0 32px 80px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto}
.modal-wide{width:95%;max-width:1400px;padding:0;display:flex;overflow:hidden;max-height:90vh}
.modal-wide .val-form-side{width:440px;min-width:400px;padding:32px;overflow-y:auto;border-right:1px solid var(--border)}
.modal-wide .val-preview-side{flex:1;display:flex;flex-direction:column;min-width:0}
.modal-wide .val-preview-side iframe{flex:1;width:100%;border:none;background:#fff;min-height:400px}
.modal h3{font-size:18px;font-weight:700;margin-bottom:10px}.modal p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:14px;transition:border-color .2s}.modal-input:focus{border-color:var(--accent)}.modal-input::placeholder{color:var(--dim)}
.modal-row{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.modal-field{display:flex;flex-direction:column;gap:4px}
.modal-field label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.8px;text-transform:uppercase}
.modal-field input,.modal-field select{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:var(--mono);outline:none;transition:border-color .2s}.modal-field input:focus,.modal-field select:focus{border-color:var(--accent)}.modal-field input::placeholder{color:var(--dim)}.modal-field select{cursor:pointer}

/* ── MISC ── */
.empty-state{text-align:center;padding:60px 24px;color:var(--dim)}.empty-state p{font-size:14px;margin-top:12px;color:var(--muted);line-height:1.6}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--green);border-radius:14px;padding:14px 22px;font-size:13px;color:var(--green);z-index:200;box-shadow:0 12px 40px rgba(0,0,0,0.5);animation:slideUp .3s ease,fadeOut .3s ease 2.5s forwards}.toast.error{border-color:var(--red);color:var(--red)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateY(10px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-track{background:transparent}.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}.main::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14)}
.settings-section{margin-bottom:32px}.settings-label{font-size:13px;color:var(--muted);margin-bottom:10px}
.settings-input{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:14px;color:var(--text);font-family:var(--font);outline:none}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo-area"><div class="logo-row"><div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>
<div><div class="logo-text">Grey Anchor</div><div class="logo-sub">Trading Lab</div></div></div></div>
<div class="nav">
<div id="nav-d" class="nav-item active" onclick="go('dashboard')">Dashboard <span class="nav-notif hidden" id="notif-dot"></span></div>
<div id="nav-s" class="nav-item" onclick="go('strategies')">Backtesting <span class="nav-badge" id="badge-s">0</span></div>
<div id="nav-v" class="nav-item" onclick="go('validated')">Validees <span class="nav-badge" id="badge-v">0</span></div>
<div class="nav-sep"></div>
<div id="nav-n" class="nav-item" onclick="go('notepad')">Bloc-notes</div>
<div id="nav-p" class="nav-item" onclick="go('settings')">Parametres</div>
</div>
<div class="sidebar-footer"><div class="user-row"><div class="user-av">T</div><div><div class="user-name">Trader</div><div class="user-role">En ligne <span class="dot-online"></span></div></div></div></div>
</div>
<div class="main" id="mc"></div>
<div class="modal-overlay hidden" id="modal-overlay"></div>
<script>
const SB_URL='https://fqlqqywybcnkknqfdfvp.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxbHFxeXd5YmNua2tucWZkZnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NDEwNzYsImV4cCI6MjA4OTUxNzA3Nn0.KtFW-x66KmSId3Gy0ITQ2Gwjohj76yCx6IHQAUkEqkA';
const sb=supabase.createClient(SB_URL,SB_KEY);
const svgUp=`<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`;
let secNames=JSON.parse(localStorage.getItem('secNames')||'{}');
let storedGroups=JSON.parse(localStorage.getItem('storedGroups')||'[]');
function getSN(sid,sec){return secNames[sid+'_'+sec]||(sec==='fondamentaux'?'Strategie de Base':sec==='rapports'?'Rapports Backtest':'Fichiers Annexes')}
function setSN(sid,sec,n){secNames[sid+'_'+sec]=n;localStorage.setItem('secNames',JSON.stringify(secNames))}
function saveGroups(){localStorage.setItem('storedGroups',JSON.stringify(storedGroups))}
function toast(m,e){const t=document.createElement('div');t.className='toast'+(e?' error':'');t.innerHTML=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2800)}
function hideModal(){document.getElementById('modal-overlay').classList.add('hidden')}
function setNav(id){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));if(id)document.getElementById(id).classList.add('active')}
function dotCls(n){const e=n.split('.').pop().toLowerCase();if(e==='html'||e==='htm')return'html';if(e==='pdf')return'pdf';if(['png','jpg','jpeg','gif','webp','svg'].includes(e))return'img';return'other'}
function fmtSz(b){if(!b)return'';if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return(b/1048576).toFixed(1)+' MB'}
function stCls(s){return'st-'+s.toLowerCase().replace(/ /g,'-')}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
async function updateBadges(){const{count:sc}=await sb.from('strategies').select('*',{count:'exact',head:true});const{count:vc}=await sb.from('validated').select('*',{count:'exact',head:true});document.getElementById('badge-s').textContent=sc||0;document.getElementById('badge-v').textContent=vc||0}
let dragId=null;
function go(v,d){hideModal();if(v==='dashboard'){setNav('nav-d');renderDash()}else if(v==='strategies'){setNav('nav-s');renderStrats()}else if(v==='detail'){setNav('nav-s');renderDetail(d)}else if(v==='fp'){setNav('nav-s');renderFP(d)}else if(v==='vp'){setNav('nav-v');renderVP(d)}else if(v==='validated'){setNav('nav-v');renderVal()}else if(v==='notepad'){setNav('nav-n');renderNotepad()}else if(v==='settings'){setNav('nav-p');renderSettings()}}

// ── NOTIFICATIONS ──
function getLastVisit(){return localStorage.getItem('lastVisit')||new Date(0).toISOString()}
function setLastVisit(){localStorage.setItem('lastVisit',new Date().toISOString())}
async function checkNotifs(){const lv=getLastVisit();const{count}=await sb.from('files').select('*',{count:'exact',head:true}).gt('created_at',lv);const dot=document.getElementById('notif-dot');if(count>0){dot?.classList.remove('hidden')}else{dot?.classList.add('hidden')}}
setInterval(checkNotifs,30000);

// ── DASHBOARD ──
async function renderDash(){document.getElementById('mc').innerHTML='<div class="loading">Chargement...</div>';
const lv=getLastVisit();setLastVisit();document.getElementById('notif-dot')?.classList.add('hidden');
const{data:rf}=await sb.from('files').select('*').order('created_at',{ascending:false}).limit(8);
const{data:newFiles}=await sb.from('files').select('*,strategies(name)').gt('created_at',lv).order('created_at',{ascending:false}).limit(10);
let notifHtml=(newFiles||[]).map(f=>`<div class="notif-item unread"><div class="notif-dot new"></div><div class="notif-text"><b>${f.name}</b> ajoute dans ${f.strategies?.name||'?'}</div><div class="notif-time">${new Date(f.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div></div>`).join('');
if(!notifHtml)notifHtml='<div style="color:var(--dim);font-size:12px;padding:12px">Aucune activite recente</div>';
let recentHtml=(rf||[]).map(f=>`<div class="recent-file"><div class="file-dot ${dotCls(f.name)}"></div><div class="recent-file-name">${f.name}</div><div class="recent-file-meta">${new Date(f.created_at).toLocaleDateString('fr-FR')}</div></div>`).join('')||'<div style="color:var(--dim);font-size:12px;padding:12px">Aucun fichier</div>';
document.getElementById('mc').innerHTML=`<div class="main-header fade-in"><div><div class="main-title">Dashboard</div><div class="main-subtitle">Bienvenue sur Grey Anchor</div></div></div>
<div class="dash-layout fade-in" style="animation-delay:.05s">
<div class="dash-card"><div class="dash-card-title">Activite recente</div>${notifHtml}</div>
<div class="dash-card"><div class="dash-card-title">Derniers fichiers</div>${recentHtml}</div>
</div>`;updateBadges();checkNotifs()}

// ── STRATEGIES ──
async function renderStrats(){document.getElementById('mc').innerHTML='<div class="loading">Chargement...</div>';
const{data:st}=await sb.from('strategies').select('*').order('id');const{data:af}=await sb.from('files').select('strategy_id');
const fc={};(af||[]).forEach(f=>{fc[f.strategy_id]=(fc[f.strategy_id]||0)+1});
const groups={};storedGroups.forEach(g=>{if(!groups[g])groups[g]=[]});
(st||[]).forEach(s=>{const g=s.group_name||'General';if(!groups[g])groups[g]=[];groups[g].push(s)});
let html=`<div class="main-header"><div><div class="main-title">Backtesting</div><div class="main-subtitle">Strategies & rapports d'optimisation</div></div><div style="display:flex;gap:10px"><button class="btn btn-ghost" onclick="showAddGroup()">+ Groupe</button><button class="btn btn-primary" onclick="showAdd()">+ Strategie</button></div></div>`;
const gKeys=Object.keys(groups);
html+='<div class="two-col-layout">';
gKeys.forEach((g,gi)=>{const items=groups[g];
html+=`<div class="group-section"><div class="group-header"><div class="group-name" onclick="editGN(this,'${esc(g)}')">${g}</div><div class="group-count">${items.length}</div>
<div class="group-del" onclick="delGroup('${esc(g)}')">&#10005;</div></div>
<div class="drop-zone" data-group="${g}" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="dropCard(event,'${esc(g)}')">
${items.map((s,i)=>{const c=fc[s.id]||0;return`<div class="folder-card fade-in" draggable="true" data-id="${s.id}" ondragstart="dragId=${s.id};this.classList.add('dragging')" ondragend="this.classList.remove('dragging')" onclick="go('detail',${s.id})">
<div class="folder-top"><span class="folder-status ${stCls(s.status)}">${s.status}</span><div class="folder-actions" onclick="event.stopPropagation()">
<div class="icon-btn" onclick="editS(${s.id},'${esc(s.name)}','${s.status}','${esc(s.group_name||'General')}')">&#9998;</div><div class="icon-btn danger" onclick="delS(${s.id},'${esc(s.name)}')">&#10005;</div></div></div>
<div class="folder-name">${s.name}</div>${c?`<div class="folder-meta">${c} fichier${c>1?'s':''}</div>`:`<div class="folder-meta" style="color:var(--dim)">Vide</div>`}</div>`}).join('')}
${!items.length?'<div style="padding:16px;text-align:center;color:var(--dim);font-size:12px">Glissez une strategie ici</div>':''}
</div></div>`});
html+='</div>';
document.getElementById('mc').innerHTML=html;updateBadges()}

function showAddGroup(){const o=document.getElementById('modal-overlay');o.classList.remove('hidden');o.innerHTML=`<div class="modal fade-in"><h3>Nouveau groupe</h3><input class="modal-input" id="g-n" placeholder="Nom du groupe" autofocus><div class="modal-row"><button class="btn btn-ghost" onclick="hideModal()">Annuler</button><button class="btn btn-primary" onclick="addGroup()">Creer</button></div></div>`;setTimeout(()=>document.getElementById('g-n')?.focus(),50)}
function addGroup(){const n=document.getElementById('g-n').value.trim();if(!n)return;if(!storedGroups.includes(n))storedGroups.push(n);saveGroups();hideModal();renderStrats()}
async function delGroup(name){storedGroups=storedGroups.filter(g=>g!==name);saveGroups();await sb.from('strategies').update({group_name:'General'}).eq('group_name',name);renderStrats()}
function editGN(el,old){el.outerHTML=`<input class="group-name-input" value="${old}" onblur="saveGN(this,'${esc(old)}')" onkeydown="if(event.key==='Enter')this.blur()">`;const inp=document.querySelector('.group-name-input');if(inp){inp.focus();inp.select()}}
async function saveGN(inp,old){const n=inp.value.trim();if(n&&n!==old){await sb.from('strategies').update({group_name:n}).eq('group_name',old);const idx=storedGroups.indexOf(old);if(idx>=0)storedGroups[idx]=n;saveGroups()}renderStrats()}
async function dropCard(e,group){e.preventDefault();e.currentTarget.classList.remove('over');if(!dragId)return;
const{data:old}=await sb.from('strategies').select('group_name').eq('id',dragId).single();
if(old?.group_name&&!storedGroups.includes(old.group_name)){storedGroups.push(old.group_name);saveGroups()}
await sb.from('strategies').update({group_name:group}).eq('id',dragId);dragId=null;renderStrats()}

function showAdd(){const o=document.getElementById('modal-overlay');o.classList.remove('hidden');o.innerHTML=`<div class="modal fade-in"><h3>Nouvelle strategie</h3><input class="modal-input" id="m-n" placeholder="Nom" autofocus><input class="modal-input" id="m-g" placeholder="Groupe"><div class="modal-row"><button class="btn btn-ghost" onclick="hideModal()">Annuler</button><button class="btn btn-primary" onclick="addS()">Ajouter</button></div></div>`;setTimeout(()=>document.getElementById('m-n')?.focus(),50)}
async function addS(){const n=document.getElementById('m-n').value.trim(),g=document.getElementById('m-g').value.trim()||'General';if(!n)return;await sb.from('strategies').insert({name:n,status:'En test',group_name:g});hideModal();renderStrats()}
function editS(id,name,st,grp){const o=document.getElementById('modal-overlay');o.classList.remove('hidden');o.innerHTML=`<div class="modal fade-in"><h3>Modifier</h3><input class="modal-input" id="e-n" value="${name}"><input class="modal-input" id="e-g" value="${grp}" placeholder="Groupe"><select class="modal-input" id="e-st" style="cursor:pointer;background:var(--bg);color:var(--text)"><option value="En test"${st==='En test'?' selected':''}>En test</option><option value="Validee"${st==='Validee'?' selected':''}>Validee</option><option value="En prod"${st==='En prod'?' selected':''}>En prod</option></select><div class="modal-row"><button class="btn btn-ghost" onclick="hideModal()">Annuler</button><button class="btn btn-primary" onclick="saveS(${id})">OK</button></div></div>`}
async function saveS(id){const n=document.getElementById('e-n').value.trim(),st=document.getElementById('e-st').value,g=document.getElementById('e-g').value.trim()||'General';if(n)await sb.from('strategies').update({name:n,status:st,group_name:g}).eq('id',id);hideModal();renderStrats()}
function delS(id,name){const o=document.getElementById('modal-overlay');o.classList.remove('hidden');o.innerHTML=`<div class="modal fade-in"><h3>Supprimer "${name}" ?</h3><p>Irreversible.</p><div class="modal-row"><button class="btn btn-ghost" onclick="hideModal()">Annuler</button><button class="btn btn-danger" onclick="confirmDelS(${id})">Supprimer</button></div></div>`}
async function confirmDelS(id){const{data:fs}=await sb.from('files').select('file_path').eq('strategy_id',id);if(fs?.length)await sb.storage.from('files').remove(fs.map(f=>f.file_path));await sb.from('files').delete().eq('strategy_id',id);await sb.from('strategies').delete().eq('id',id);hideModal();renderStrats()}

// ── DETAIL ──
let curSid=null;const secs=['annexes','fondamentaux','rapports'];
async function renderDetail(id){curSid=id;document.getElementById('mc').innerHTML='<div class="loading">Chargement...</div>';
const{data:s}=await sb.from('strategies').select('*').eq('id',id).single();if(!s){go('strategies');return}
const{data:fs}=await sb.from('files').select('*').eq('strategy_id',id).order('id');
function fl(arr,sec){if(!arr.length)return`<div class="empty-files">Aucun fichier</div>`;
return`<div class="file-list">${arr.map((f,i)=>{const isH=f.name.endsWith('.html')||f.name.endsWith('.htm');
return`<div class="file-row fade-in" style="animation-delay:${i*.03}s"><div class="file-dot ${dotCls(f.name)}"></div>
<div class="file-info"><div class="file-name" onclick="event.stopPropagation();rnS(${f.id},'${esc(f.name)}')">${f.name}</div>
<div class="file-meta">${fmtSz(f.size)} &middot; ${new Date(f.created_at).toLocaleDateString('fr-FR')}</div></div>
<div class="file-actions">${isH?`<button class="file-preview-btn" onclick="event.stopPropagation();go('fp',{fid:${f.id},sid:${id},fn:'${esc(f.name)}',fp:'${f.file_path}',sn:'${esc(s.name)}'})">Voir</button>`:''}
<button class="file-action-btn star" onclick="event.stopPropagation();starF(${f.id},'${esc(f.name)}','${f.file_path}',${f.size||0},'${esc(s.name)}','${sec}')">&#9733;</button>
<button class="file-action-btn del" onclick="event.stopPropagation();delF(${f.id},'${f.file_path}',${id})">&#10005;</button></div></div>`}).join('')}</div>`}
function ub(sec){return`<label class="upload-btn">${svgUp} Upload<input type="file" class="upload-input" multiple onchange="upF(${id},'${sec}',this.files);this.value=''"></label>`}
let h=`<div class="back-row fade-in"><div class="back-btn" onclick="go('strategies')"><span>&larr;</span> Retour</div><div class="breadcrumb"><span onclick="go('strategies')">Backtesting</span><span class="bc-sep">&#9656;</span><span>${s.name}</span></div></div>
<div class="main-header fade-in" style="animation-delay:.05s"><div class="main-title">${s.name}</div><span class="folder-status ${stCls(s.status)}" style="font-size:11px;padding:5px 14px">${s.status}</span></div>`;
let d=0.08;for(const sec of secs){const arr=(fs||[]).filter(f=>f.section===sec);const sn=getSN(id,sec);
h+=`<div class="section-row fade-in" style="animation-delay:${d}s"><div class="section-title" onclick="editSN(${id},'${sec}',this)">${sn}</div>${ub(sec)}</div>${fl(arr,sec)}`;d+=.06}
document.getElementById('mc').innerHTML=h}
function editSN(sid,sec,el){const cur=getSN(sid,sec);el.outerHTML=`<input class="section-title-input" value="${cur}" onblur="saveSN(${sid},'${sec}',this)" onkeydown="if(event.key==='Enter')this.blur()">`;const inp=document.querySelector('.section-title-input');if(inp){inp.focus();inp.select()}}
function saveSN(sid,sec,inp){const n=inp.value.trim();if(n)setSN(sid,sec,n);renderDetail(sid)}
async function upF(sid,sec,fl){for(const f of fl){const p=`${sid}/${sec}/${Date.now()}_${f.name}`;const{error}=await sb.storage.from('files').upload(p,f);if(error){toast('Erreur: '+error.message,true);continue}await sb.from('files').insert({strategy_id:sid,section:sec,name:f.name,file_path:p,size:f.size})}toast('&#10003; Upload OK');renderDetail(sid)}
async function delF(fid,p,sid){await sb.storage.from('files').remove([p]);await sb.from('files').delete().eq('id',fid);renderDetail(sid)}
function rnS(fid,cur){const el=event.target;el.outerHTML=`<input class="file-name-input" value="${cur}" onblur="rnE(${fid},this)" onkeydown="if(event.key==='Enter')this.blur()">`;const inp=document.querySelector('.file-name-input');if(inp){inp.focus();inp.select()}}
async function rnE(fid,inp){const n=inp.value.trim();if(n)await sb.from('files').update({name:n}).eq('id',fid);if(curSid)renderDetail(curSid)}

// ── STAR ──
function starF(fid,name,path,size,sn,sec){if(sec==='rapports'){showValModal(fid,name,path,size,sn)}else{simpleStar(name,path,size,sn,sec)}}
async function simpleStar(name,path,size,sn,sec){await sb.from('validated').insert({name,file_path:path,size,origin_strategy:sn,origin_section:getSN(0,sec)});updateBadges();toast('&#9733; <b>'+name+'</b> dans Validees')}
async function showValModal(fid,name,path,size,sn){const o=document.getElementById('modal-overlay');o.classList.remove('hidden');
const url=sb.storage.from('files').getPublicUrl(path).data.publicUrl;let docHtml='';try{const r=await fetch(url);docHtml=await r.text()}catch(e){docHtml='<p>Erreur</p>'}
o.innerHTML=`<div class="modal modal-wide fade-in">
<div class="val-form-side"><h3>&#9733; Valider une configuration</h3><p>Consultez le rapport a droite et remplissez les parametres</p>
<input class="modal-input" id="v-name" value="${sn} - Config #">
<div class="modal-grid">
<div class="modal-field"><label>Config #</label><input id="v-cfg" placeholder="3"></div>
<div class="modal-field"><label>TP (pts)</label><input id="v-tp" placeholder="175"></div>
<div class="modal-field"><label>SL (pts)</label><input id="v-sl" placeholder="195"></div>
<div class="modal-field"><label>BE (%)</label><input id="v-be" placeholder="80%"></div>
<div class="modal-field"><label>Buffer</label><input id="v-buf" placeholder="45"></div>
<div class="modal-field"><label>Avec BE</label><select id="v-wbe"><option value="Oui">Oui</option><option value="Non">Non</option></select></div>
<div class="modal-field"><label>SL max</label><input id="v-slm" placeholder="3"></div>
<div class="modal-field"><label>Stop 1er TP</label><select id="v-stp"><option value="Oui">Oui</option><option value="Non">Non</option></select></div>
<div class="modal-field"><label>PnL</label><input id="v-pnl" placeholder="+34,400 €"></div>
<div class="modal-field"><label>Max DD</label><input id="v-dd" placeholder="-3,240 €"></div>
<div class="modal-field"><label>Win Rate</label><input id="v-wr" placeholder="66.7%"></div>
<div class="modal-field"><label>PF</label><input id="v-pf" placeholder="4.44"></div>
<div class="modal-field"><label>Calmar</label><input id="v-cal" placeholder="10.62"></div>
<div class="modal-field"><label>Trades</label><input id="v-tr" placeholder="24"></div>
<div class="modal-field"><label>Sharpe</label><input id="v-sh" placeholder="1.58"></div>
</div><div class="modal-row"><button class="btn btn-ghost" onclick="hideModal()">Annuler</button><button class="btn btn-primary" onclick="submitVal('${esc(name)}','${path}',${size},'${esc(sn)}')">&#9733; Valider</button></div></div>
<div class="val-preview-side"><div class="preview-bar"><span class="preview-bar-name">${name}</span><div class="preview-actions"><button class="p-btn" onclick="openFS('val-pv')">Plein ecran</button></div></div>
<iframe id="val-pv"></iframe></div></div>`;
setTimeout(()=>{const f=document.getElementById('val-pv');if(f){const d=f.contentDocument||f.contentWindow.document;d.open();d.write(docHtml);d.close()}document.getElementById('v-cfg')?.focus()},150)}
async function submitVal(fn,path,size,sn){const name=document.getElementById('v-name').value.trim()||sn;const wbe=document.getElementById('v-wbe').value,stp=document.getElementById('v-stp').value;
const be=document.getElementById('v-be').value.trim()+(wbe==='Non'?' (off)':'');const slm=document.getElementById('v-slm').value.trim();
const sl=document.getElementById('v-sl').value.trim()+(slm?' (max:'+slm+')':'');
await sb.from('validated').insert({name,file_path:path,size,origin_strategy:sn,origin_section:'Rapports Backtest',subtitle:'Depuis : '+sn+' · Rapports Backtest · '+new Date().toLocaleDateString('fr-FR'),
config_number:document.getElementById('v-cfg').value.trim(),tp:document.getElementById('v-tp').value.trim(),sl,be_trigger:be,buffer:document.getElementById('v-buf').value.trim(),
pnl:document.getElementById('v-pnl').value.trim(),max_dd:document.getElementById('v-dd').value.trim(),win_rate:document.getElementById('v-wr').value.trim(),
profit_factor:document.getElementById('v-pf').value.trim(),calmar:document.getElementById('v-cal').value.trim(),trades:document.getElementById('v-tr').value.trim(),
sharpe:document.getElementById('v-sh').value.trim(),custom_params:JSON.stringify(stp==='Oui'?[{l:'Stop 1er TP',v:'Oui'}]:[{l:'Stop 1er TP',v:'Non'}])});
updateBadges();hideModal();toast('&#9733; <b>'+name+'</b> valide !')}

// ── FILE PREVIEW ──
async function renderFP(d){document.getElementById('mc').innerHTML='<div class="loading">Chargement...</div>';
const url=sb.storage.from('files').getPublicUrl(d.fp).data.publicUrl;let html='';
try{const r=await fetch(url);html=await r.text()}catch(e){html='<p>Erreur</p>'}
document.getElementById('mc').innerHTML=`<div class="back-row fade-in"><div class="back-btn" onclick="go('detail',${d.sid})"><span>&larr;</span> Retour</div>
<div class="breadcrumb"><span onclick="go('strategies')">Backtesting</span><span class="bc-sep">&#9656;</span><span onclick="go('detail',${d.sid})">${d.sn}</span><span class="bc-sep">&#9656;</span><span>${d.fn}</span></div></div>
<div class="main-title fade-in" style="margin-bottom:24px">${d.fn}</div>
<div class="preview-frame fade-in" style="animation-delay:.1s"><div class="preview-bar"><span class="preview-bar-name">${d.fn}</span>
<div class="preview-actions"><button class="p-btn" onclick="openFS('pvi')">Plein ecran</button><a class="p-btn" href="${url}" target="_blank">Nouvel onglet</a></div></div>
<iframe id="pvi" class="preview-iframe"></iframe></div>`;
setTimeout(()=>{const f=document.getElementById('pvi');if(f){const d2=f.contentDocument||f.contentWindow.document;d2.open();d2.write(html);d2.close()}},150)}
function openFS(id){const e=document.getElementById(id);if(e.requestFullscreen)e.requestFullscreen();else if(e.webkitRequestFullscreen)e.webkitRequestFullscreen()}

// ── VALIDATED ──
async function renderVal(){document.getElementById('mc').innerHTML='<div class="loading">Chargement...</div>';
const{data:vs}=await sb.from('validated').select('*').order('id',{ascending:false});
if(!vs?.length){document.getElementById('mc').innerHTML=`<div class="main-header fade-in"><div><div class="main-title">Validees</div><div class="main-subtitle">Configurations selectionnees</div></div></div><div class="empty-state fade-in"><div style="font-size:48px;opacity:0.2;margin-bottom:16px">&#9733;</div><p>Aucune config validee.<br>Cliquez l'etoile d'un rapport backtest.</p></div>`;return}
document.getElementById('mc').innerHTML=`<div class="main-header fade-in"><div><div class="main-title">Validees</div><div class="main-subtitle">${vs.length} configuration${vs.length>1?'s':''} selectionnee${vs.length>1?'s':''}</div></div></div>
${vs.map((v,i)=>{const hp=v.tp||v.sl||v.pnl;const isH=(v.file_path||'').includes('.htm');
let customP=[];try{customP=JSON.parse(v.custom_params||'[]')}catch(e){}
let kpis='',params='';
if(hp){const kd=[v.pnl?{l:'PnL',v:v.pnl,c:'g'}:0,v.max_dd?{l:'Max DD',v:v.max_dd,c:'r'}:0,v.win_rate?{l:'Win Rate',v:v.win_rate,c:'g'}:0,v.calmar?{l:'Calmar',v:v.calmar,c:'b'}:0,v.profit_factor?{l:'PF',v:v.profit_factor,c:'g'}:0,v.sharpe?{l:'Sharpe',v:v.sharpe,c:'b'}:0].filter(Boolean);
if(kd.length)kpis=`<div class="kpi-strip">${kd.map(k=>`<div class="kpi-box"><div class="kpi-label">${k.l}</div><div class="kpi-val ${k.c}">${k.v}</div></div>`).join('')}</div>`;
const pd=[v.tp?{l:'TP',v:v.tp,s:'color:var(--green)'}:0,v.sl?{l:'SL',v:v.sl,s:'color:var(--red)'}:0,v.be_trigger?{l:'BE',v:v.be_trigger,s:''}:0,v.buffer?{l:'Buffer',v:v.buffer,s:''}:0,v.trades?{l:'Trades',v:v.trades,s:''}:0,v.config_number?{l:'Config',v:'#'+v.config_number,s:'color:var(--accent)'}:0,...customP.map(c=>({l:c.l,v:c.v,s:'color:var(--accent2)'}))].filter(Boolean);
if(pd.length)params=`<div class="params-row">${pd.map(p=>`<div class="param-chip"><div class="param-chip-label">${p.l}</div><div class="param-chip-val" style="${p.s||''}">${p.v}</div></div>`).join('')}<div class="add-chip-btn" onclick="addChip(${v.id})">+</div></div>`}
const sub=v.subtitle||('Depuis : '+(v.origin_strategy||'?')+' · '+(v.origin_section||'?'));
return`<div class="val-card fade-in" style="animation-delay:${i*.04}s"><div class="val-header"><div><div class="val-name">${v.name}</div>
<div class="val-subtitle" onclick="editValSub(${v.id},this)">${sub}</div></div>
<div class="val-actions">${isH?`<button class="file-preview-btn" onclick="go('vp',{id:${v.id},name:'${esc(v.name)}',path:'${v.file_path}'})">Voir rapport</button>`:''}<button class="file-action-btn del" onclick="remVal(${v.id})">&#10005;</button></div></div>${kpis}${params}</div>`}).join('')}`}
function editValSub(id,el){const cur=el.textContent;el.outerHTML=`<input class="val-subtitle-input" value="${cur}" onblur="saveValSub(${id},this)" onkeydown="if(event.key==='Enter')this.blur()">`;const inp=document.querySelector('.val-subtitle-input');if(inp){inp.focus();inp.select()}}
async function saveValSub(id,inp){const n=inp.value.trim();if(n)await sb.from('validated').update({subtitle:n}).eq('id',id);renderVal()}
function addChip(vid){const o=document.getElementById('modal-overlay');o.classList.remove('hidden');o.innerHTML=`<div class="modal fade-in"><h3>Ajouter un parametre</h3><div class="modal-grid"><div class="modal-field"><label>Nom</label><input id="cp-l" placeholder="Timeframe"></div><div class="modal-field"><label>Valeur</label><input id="cp-v" placeholder="15min"></div></div><div class="modal-row"><button class="btn btn-ghost" onclick="hideModal()">Annuler</button><button class="btn btn-primary" onclick="saveChip(${vid})">Ajouter</button></div></div>`;setTimeout(()=>document.getElementById('cp-l')?.focus(),50)}
async function saveChip(vid){const l=document.getElementById('cp-l').value.trim(),v=document.getElementById('cp-v').value.trim();if(!l||!v)return;const{data}=await sb.from('validated').select('custom_params').eq('id',vid).single();let arr=[];try{arr=JSON.parse(data.custom_params||'[]')}catch(e){}arr.push({l,v});await sb.from('validated').update({custom_params:JSON.stringify(arr)}).eq('id',vid);hideModal();renderVal()}
async function remVal(id){await sb.from('validated').delete().eq('id',id);updateBadges();renderVal()}
async function renderVP(d){document.getElementById('mc').innerHTML='<div class="loading">Chargement...</div>';const url=sb.storage.from('files').getPublicUrl(d.path).data.publicUrl;let html='';try{const r=await fetch(url);html=await r.text()}catch(e){html='<p>Erreur</p>'}
document.getElementById('mc').innerHTML=`<div class="back-row fade-in"><div class="back-btn" onclick="go('validated')"><span>&larr;</span> Retour</div><div class="breadcrumb"><span onclick="go('validated')">Validees</span><span class="bc-sep">&#9656;</span><span>${d.name}</span></div></div>
<div class="main-title fade-in" style="margin-bottom:24px">${d.name}</div><div class="preview-frame fade-in" style="animation-delay:.1s"><div class="preview-bar"><span class="preview-bar-name">${d.name}</span><div class="preview-actions"><button class="p-btn" onclick="openFS('pvi')">Plein ecran</button></div></div><iframe id="pvi" class="preview-iframe"></iframe></div>`;
setTimeout(()=>{const f=document.getElementById('pvi');if(f){const d2=f.contentDocument||f.contentWindow.document;d2.open();d2.write(html);d2.close()}},150)}

// ── NOTEPAD ──
function renderNotepad(){const saved=localStorage.getItem('notepad')||'';
document.getElementById('mc').innerHTML=`<div class="main-header fade-in"><div><div class="main-title">Bloc-notes</div><div class="main-subtitle">Notes, idees, rappels</div></div></div>
<div class="notepad fade-in" style="animation-delay:.05s"><div class="notepad-header"><div class="notepad-title">Notes personnelles</div><div id="np-status" class="notepad-status">Sauvegarde auto</div></div>
<div class="notepad-body"><textarea class="notepad-textarea" id="np-text" placeholder="Ecrivez vos notes ici...&#10;&#10;Ex: Attention au slippage sur YM pendant les annonces macro&#10;Penser a tester la config #3 sur ES&#10;Verifier le drawdown sur la periode Q4...">${saved}</textarea></div></div>`;
let timeout;document.getElementById('np-text').addEventListener('input',function(){clearTimeout(timeout);document.getElementById('np-status').textContent='Modification...';
timeout=setTimeout(()=>{localStorage.setItem('notepad',this.value);document.getElementById('np-status').textContent='Sauvegarde OK'},500)})}

// ── SETTINGS ──
function renderSettings(){document.getElementById('mc').innerHTML=`<div class="main-header fade-in"><div><div class="main-title">Parametres</div><div class="main-subtitle">Configuration de l'application</div></div></div><div class="fade-in" style="animation-delay:.05s"><div class="settings-section"><div style="font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:20px">Profil</div><div class="settings-label">Nom</div><input class="settings-input" value="Trader"><div class="settings-label" style="margin-top:16px">Role</div><input class="settings-input" value="Trader"></div><div class="settings-section"><div style="font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:20px">Apparence</div><div style="display:flex;gap:10px"><button class="btn btn-ghost" style="opacity:0.5;pointer-events:none">Clair</button><button class="btn btn-primary" style="pointer-events:none">Sombre</button></div></div></div>`}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)hideModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')hideModal()});
checkNotifs();go('dashboard');
</script>
</body>
</html>
